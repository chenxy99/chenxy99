<svg width="1200" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave1grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#7B2FBE;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="wave2grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B2FBE;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#00D9FF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7B2FBE;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Wave layers -->
  <path d="M0,180 C200,140 400,200 600,160 C800,120 1000,180 1200,150 L1200,280 L0,280 Z"
        fill="url(#wave1grad)"/>
  <path d="M0,200 C150,170 350,220 550,185 C750,150 950,200 1200,175 L1200,280 L0,280 Z"
        fill="url(#wave2grad)"/>
  <path d="M0,220 C180,200 380,240 600,215 C820,190 1000,230 1200,210 L1200,280 L0,280 Z"
        fill="#0D1117" opacity="0.6"/>

  <!-- Dot grid decoration -->
  <g opacity="0.08" fill="#00D9FF">
    <circle cx="80" cy="50" r="1.5"/><circle cx="120" cy="50" r="1.5"/><circle cx="160" cy="50" r="1.5"/>
    <circle cx="80" cy="90" r="1.5"/><circle cx="120" cy="90" r="1.5"/><circle cx="160" cy="90" r="1.5"/>
    <circle cx="80" cy="130" r="1.5"/><circle cx="120" cy="130" r="1.5"/><circle cx="160" cy="130" r="1.5"/>
    <circle cx="1040" cy="50" r="1.5"/><circle cx="1080" cy="50" r="1.5"/><circle cx="1120" cy="50" r="1.5"/>
    <circle cx="1040" cy="90" r="1.5"/><circle cx="1080" cy="90" r="1.5"/><circle cx="1120" cy="90" r="1.5"/>
    <circle cx="1040" cy="130" r="1.5"/><circle cx="1080" cy="130" r="1.5"/><circle cx="1120" cy="130" r="1.5"/>
  </g>

  <!-- Accent line -->
  <line x1="360" y1="155" x2="840" y2="155" stroke="#00D9FF" stroke-width="0.5" opacity="0.3"/>

  <!-- Main name text -->
  <text x="600" y="108"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="700"
        fill="#00D9FF" text-anchor="middle"
        filter="url(#glow)">Xianyu Chen</text>

  <!-- Subtitle -->
  <text x="600" y="148"
        font-family="'Courier New', Courier, monospace"
        font-size="18" font-weight="400"
        fill="#AAAAAA" text-anchor="middle" letter-spacing="2">
    CS PhD  ·  Vision &amp; Language  ·  LLM  ·  Human-Centered AI
  </text>
</svg>
